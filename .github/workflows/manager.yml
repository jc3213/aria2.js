name: aria2-task-manager

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "package.json"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  delete_release:
    needs: prepare
    if: needs.prepare.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "Deleting release $VERSION"

          gh release delete "$VERSION" -y || true
          git push origin ":refs/tags/$VERSION" || true

  build:
    needs: [prepare, delete_release]
    if: needs.prepare.outputs.skip == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch external JS/CSS
        run: |
          curl -L -o app/common.css https://jc3213.github.io/download_with_aria2/chromium/pages/common.css
          curl -L -o app/popup.css https://jc3213.github.io/download_with_aria2/chromium/pages/popup/popup.css
          curl -L -o app/popup.js https://jc3213.github.io/download_with_aria2/chromium/pages/popup/popup.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Electron build for version $VERSION"

      - name: Upload assets to release
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          find builds -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" \) | while read file; do
            echo "Uploading $file"
            gh release upload "$VERSION" "$file" --clobber
          done

