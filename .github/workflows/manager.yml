name: aria2-task-manager

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "package.json"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"

          echo "Checking release $VERSION"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Deleting old release $VERSION"
            gh release delete "$VERSION" -y || true
            git push origin ":refs/tags/$VERSION" || true
          fi

      - name: Create new empty release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Auto-generated release for version $VERSION"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch external JS/CSS
        run: |
          curl -L -o app/common.css https://jc3213.github.io/download_with_aria2/chromium/pages/common.css
          curl -L -o app/popup.css https://jc3213.github.io/download_with_aria2/chromium/pages/popup/popup.css
          curl -L -o app/popup.js https://jc3213.github.io/download_with_aria2/chromium/pages/popup/popup.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run dist

      - name: Upload installers (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Uploading installers for $VERSION"

          find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" \) | while read file; do
            echo "Uploading $file"
            gh release upload "$VERSION" "$file" --clobber
          done

      - name: Upload installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Preparing Windows installers for $env:VERSION"

          $dist = "dist"
          $version = $env:VERSION

          $zipName = "aria2-task-manager-$version-win64.zip"
          Write-Host "Zipping win-unpacked/* to $zipName"
          Compress-Archive -Path "$dist/win-unpacked/*" -DestinationPath "$zipName" -Force

          $installer = Get-ChildItem -Recurse $dist -Filter "*Setup*.exe" | Select-Object -First 1
          if ($installer) {
            $installerOut = "aria2-task-manager-$version-win64.exe"
            Write-Host "Renaming installer to $installerOut"
            Copy-Item $installer.FullName $installerOut -Force
          }

          # 3. 上传绿色版 zip
          Write-Host "Uploading $zipName"
          gh release upload $version $zipName --clobber

          # 4. 上传安装版 exe
          if (Test-Path $installerOut) {
            Write-Host "Uploading $installerOut"
            gh release upload $version $installerOut --clobber
          }
