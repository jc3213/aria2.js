name: minify-js

on:
  push:
    branches:
      - main
    paths:
      - 'src/*.js'
      - 'sharedworker/*.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm install -g terser

      - name: Minify JS files
        run: |
          mkdir -p min
          for file in src/*.js sharedworker/*.js; do
            [ -f "$file" ] || continue
            base=$(basename "$file" .js)
            npx terser "$file" -o "min/${base}.min.js"
          done

      - name: Commit minified files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add min/*.min.js
          git diff --cached --quiet || git commit -m "Auto-minified JS files"
          git push
